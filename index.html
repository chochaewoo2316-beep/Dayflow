<!DOCTYPE html>
<!--
  DayFlow — single-file personal task + event + weather PWA
  =========================================================
  배포 방법:
  (a) GitHub Pages — 리포지토리에 index.html 업로드 → Settings > Pages 에서
      브랜치를 main/root로 지정 → https://<user>.github.io/<repo>/ 를 iPhone Safari에서 열고
      공유 버튼 → "홈 화면에 추가" 로 웹앱처럼 사용
  (b) iPhone "파일" 앱 — index.html 을 iCloud Drive/로컬 폴더에 저장 → 파일 앱에서
      길게 눌러 "공유 > Safari로 열기" 후 동일하게 홈 화면에 추가
  외부 의존성: Open-Meteo (API 키 불필요), ipapi.co (fallback). 네트워크 실패 시
  모든 데이터는 localStorage 캐시로 동작.
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DayFlow">
  <meta name="theme-color" content="#08090A">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%2308090A'/%3E%3Ctext x='90' y='130' font-family='-apple-system,Helvetica,Arial,sans-serif' font-size='124' font-weight='800' text-anchor='middle' fill='%23F5A524'%3ED%3C/text%3E%3C/svg%3E">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%2308090A'/%3E%3Ctext x='90' y='130' font-family='-apple-system,Helvetica,Arial,sans-serif' font-size='124' font-weight='800' text-anchor='middle' fill='%23F5A524'%3ED%3C/text%3E%3C/svg%3E">
  <link rel="manifest" href='data:application/manifest+json,{"name"%3A"DayFlow"%2C"short_name"%3A"DayFlow"%2C"start_url"%3A"./"%2C"display"%3A"standalone"%2C"background_color"%3A"%2308090A"%2C"theme_color"%3A"%2308090A"%2C"orientation"%3A"portrait"}'>
  <title>DayFlow</title>
  <script>
    // 렌더 전 테마 적용 — 깜빡임 방지
    (function(){
      var t = 'dark';
      try { t = localStorage.getItem('dayflow.theme') || 'dark'; } catch(e){}
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    :root {
      --accent:        #F5A524;
      --accent-hover:  #FFB733;
      --system-blue:   #F5A524;
      --system-pink:   #E65C5C;
      --system-purple: #4AB482;
      --system-red:    #E65C5C;
      --system-green:  #4AB482;
      --system-orange: #F5A524;
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ===== Dark theme (default) ===== */
    [data-theme="dark"] {
      --bg-primary:   #08090A;
      --bg-secondary: #1C1D1F;
      --bg-tertiary:  #242528;
      --text-primary:   #F7F8F8;
      --text-secondary: #8A8F98;
      --text-tertiary:  #62656B;
      --separator:        #26272B;
      --separator-opaque: #26272B;
      --accent-muted: rgba(245, 165, 36, 0.18);
      --shadow-card:  0 0 0 1px var(--separator);
      --shadow-float: 0 2px 12px rgba(245, 165, 36, 0.40);
      --backdrop-alpha: 0.5;
      --seg-active-bg: #2A2B2E;
      --chip-bg-alpha: 0.18;
    }

    /* ===== Light theme ===== */
    [data-theme="light"] {
      --bg-primary:   #FFFFFF;
      --bg-secondary: #F7F8F9;
      --bg-tertiary:  #EEEFF1;
      --text-primary:   #0F1011;
      --text-secondary: #6B7280;
      --text-tertiary:  #9CA3AF;
      --separator:        #E6E8EB;
      --separator-opaque: #E6E8EB;
      --accent-muted: rgba(245, 165, 36, 0.12);
      --shadow-card:  0 0 0 1px var(--separator);
      --shadow-float: 0 2px 10px rgba(245, 165, 36, 0.28);
      --backdrop-alpha: 0.3;
      --seg-active-bg: #FFFFFF;
      --chip-bg-alpha: 0.15;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body.transitions-enabled,
    body.transitions-enabled *,
    body.transitions-enabled *::before,
    body.transitions-enabled *::after {
      transition: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior-y: contain;
      letter-spacing: -0.01em;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      padding-top: var(--safe-top);
    }

    /* ---------- Top / Bottom Panes ---------- */
    .top-pane {
      flex: 1.4 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 2px 16px 8px;
    }
    .hairline {
      height: 0.5px;
      background: var(--separator);
      flex-shrink: 0;
    }
    .bottom-pane {
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--safe-bottom) + 96px);
    }

    /* ---------- Pull to refresh ---------- */
    .ptr-indicator {
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      height: 0;
      overflow: hidden;
      transition: height 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ptr-indicator .ptr-arrow {
      display: inline-block;
      transition: transform 0.2s ease;
      margin-right: 6px;
    }
    .ptr-indicator.ready .ptr-arrow { transform: rotate(180deg); }
    .ptr-indicator.refreshing .ptr-arrow {
      animation: ptr-spin 0.6s linear infinite;
    }
    @keyframes ptr-spin {
      to { transform: rotate(360deg); }
    }

    /* ---------- Theme toggle ---------- */
    .theme-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      border-radius: 8px;
      padding: 0;
      flex-shrink: 0;
    }
    .theme-btn:active { background: var(--bg-tertiary); }

    /* ---------- Settings menu ---------- */
    .settings-menu {
      position: fixed;
      top: calc(var(--safe-top) + 54px);
      right: max(16px, calc((100vw - 520px) / 2 + 16px));
      min-width: 220px;
      background: var(--bg-secondary);
      border: 1px solid var(--separator);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.32);
      padding: 4px;
      display: none;
      z-index: 102;
    }
    .settings-menu.open { display: block; }
    .settings-menu button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 10px;
      border-radius: 5px;
      cursor: pointer;
      text-align: left;
    }
    .settings-menu button:hover { background: var(--bg-tertiary); }
    .settings-menu .sep {
      height: 1px;
      background: var(--separator);
      margin: 4px 2px;
    }
    .settings-menu .chk {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1.5px solid var(--separator-opaque);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .settings-menu button.active .chk {
      background: var(--accent);
      border-color: var(--accent);
    }
    .settings-menu button.active .chk::after {
      content: '';
      width: 4px;
      height: 7px;
      border-right: 1.5px solid #fff;
      border-bottom: 1.5px solid #fff;
      transform: rotate(45deg) translate(-0.5px, -1px);
    }

    /* ---------- Month Nav ---------- */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 4px 8px;
      flex-shrink: 0;
      gap: 8px;
    }
    .month-nav .month-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text-primary);
      flex: 1;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .nav-btn {
      border: 1px solid var(--separator);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .nav-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-btn:active { background: var(--bg-tertiary); }
    .nav-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .nav-btn.primary {
      color: var(--accent);
      border-color: var(--accent-muted);
      background: var(--accent-muted);
    }
    .nav-btn.primary:hover {
      background: rgba(245, 165, 36, 0.22);
      color: var(--accent);
    }

    .weekday-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 4px 0 6px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--separator);
    }
    .weekday-header .wh.sun,
    .weekday-header .wh.sat { color: var(--text-tertiary); }

    /* ---------- Month Grid ---------- */
    .month-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 1fr;
      gap: 0;
      min-height: 0;
    }
    .day-cell {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 4px 3px 2px;
      border-right: 1px solid var(--separator);
      border-bottom: 1px solid var(--separator);
      user-select: none;
      -webkit-touch-callout: none;
      position: relative;
      cursor: pointer;
      min-height: 0;
      overflow: hidden;
    }
    .day-cell:nth-child(7n) { border-right: none; }
    .day-cell .cell-head {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-bottom: 2px;
      min-height: 18px;
    }
    .day-cell .num {
      min-width: 18px;
      height: 18px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      border-radius: 4px;
      color: var(--text-primary);
    }
    .day-cell .weather-emoji {
      font-size: 11px;
      line-height: 1;
      flex-shrink: 0;
      opacity: 0.9;
    }
    .day-cell.other .num { color: var(--text-tertiary); opacity: 0.5; }
    .day-cell.today .num {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .day-cell.selected:not(.today) .num {
      box-shadow: inset 0 0 0 1px var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    .day-cell.selected.today .num {
      box-shadow: 0 0 0 1.5px var(--bg-primary), 0 0 0 2.5px var(--accent);
    }
    .day-cell .chips {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .day-cell .chip {
      height: 16px;
      line-height: 16px;
      padding: 0 5px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -0.1px;
      border-left: 2px solid currentColor;
    }
    .day-cell .chip.done {
      opacity: 0.5;
      text-decoration: line-through;
    }
    .day-cell .more-chip {
      font-size: 9.5px;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 0 5px;
      line-height: 12px;
      letter-spacing: 0.1px;
    }

    /* Header (bottom pane) — compact */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 2px;
    }

    .header-date .label {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .header-date .title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.15px;
      margin-top: 1px;
      color: var(--text-primary);
    }

    .progress-ring {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: transparent;
      box-shadow: none;
      transform: translateY(20px);
    }

    /* Weekly Calendar Strip */
    .week-strip {
      margin: 10px 16px 8px;
      padding: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--separator);
      border-radius: var(--radius-md);
      box-shadow: none;
      min-height: 60px;
    }

    /* Task List */
    .task-list {
      margin: 10px 16px 0;
      background: var(--bg-secondary);
      border: 1px solid var(--separator);
      border-radius: var(--radius-md);
      box-shadow: none;
      min-height: 160px;
      padding: 4px 0;
    }

    .task-list:empty::after {
      content: "할 일이 없습니다";
      display: block;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 15px;
      padding: 72px 16px;
    }

    /* Floating Add Button */
    .fab {
      position: fixed;
      right: max(16px, calc((100vw - 520px) / 2 + 16px));
      bottom: calc(16px + env(safe-area-inset-bottom));
      width: 46px;
      height: 46px;
      border-radius: 8px;
      border: 1px solid var(--accent-hover);
      background: var(--accent);
      color: #fff;
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
      box-shadow: var(--shadow-float);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s ease, background 0.15s ease;
    }
    .fab:hover { background: var(--accent-hover); }
    .fab:active { transform: scale(0.94); }
    [data-theme="light"] .fab { box-shadow: var(--shadow-float), 0 2px 8px rgba(0,0,0,0.15); }

    /* ---------- Progress Ring ---------- */
    .progress-ring {
      position: relative;
      width: 60px;
      height: 60px;
      background: transparent;
      box-shadow: none;
    }
    .progress-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .progress-ring .track {
      fill: none;
      stroke: var(--separator);
      stroke-width: 5;
    }
    .progress-ring .bar {
      fill: none;
      stroke: var(--system-blue);
      stroke-width: 5;
      stroke-linecap: round;
      transition: stroke-dasharray 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .progress-ring .label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.2px;
    }

    /* ---------- Week Strip ---------- */
    .week-strip {
      display: flex;
      justify-content: space-between;
      gap: 4px;
      padding: 10px 8px;
    }
    .week-day {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 6px 0 8px;
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
    }
    .week-day .wd {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .week-day .dd {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .week-day .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: transparent;
    }
    .week-day.has-events .dot { background: var(--accent); }
    .week-day .evt-label {
      font-size: 9px;
      line-height: 1.1;
      color: var(--text-secondary);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
      padding: 0 2px;
    }
    .week-day.selected .dd {
      background: var(--accent);
      color: #fff;
    }
    .week-day.today:not(.selected) .dd { color: var(--accent); font-weight: 600; }
    .week-day.selected.today .dd { background: var(--accent); color: #fff; }
    .week-day.selected .wd { color: var(--accent); }

    /* ---------- Weather Inline Bar ---------- */
    .weather-bar {
      padding: 4px 16px 6px;
      font-size: 12.5px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: none;
    }
    .weather-bar.show { display: block; }
    .weather-bar .wb-sep {
      margin: 0 6px;
      opacity: 0.5;
    }

    /* ---------- Weather accordion (task list top) ---------- */
    .weather-accordion {
      padding: 8px 14px;
      border-bottom: 1px solid var(--separator);
      cursor: pointer;
      user-select: none;
      display: none;
    }
    .weather-accordion.show { display: block; }
    .weather-accordion .wa-summary {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .weather-accordion .wa-summary .wa-chevron {
      margin-left: auto;
      font-size: 10px;
      transition: transform 0.15s ease;
      opacity: 0.5;
    }
    .weather-accordion.open .wa-chevron { transform: rotate(90deg); }
    .weather-accordion .wa-detail {
      display: none;
      padding-top: 6px;
    }
    .weather-accordion.open .wa-detail { display: block; }
    .weather-accordion .wa-detail .rain-line {
      font-size: 11.5px;
      color: var(--text-secondary);
      padding: 2px 0;
      font-variant-numeric: tabular-nums;
    }

    /* ---------- Segmented Control ---------- */
    .segmented {
      display: flex;
      margin: 12px 16px 0;
      padding: 3px;
      background: var(--bg-tertiary);
      border: 1px solid var(--separator);
      border-radius: var(--radius-md);
      position: relative;
      gap: 2px;
    }
    .segmented button {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 0;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .segmented button:hover { color: var(--text-primary); }
    .segmented button.active {
      background: var(--seg-active-bg);
      color: var(--text-primary);
      box-shadow: 0 0 0 1px var(--separator);
    }

    /* ---------- Task Item ---------- */
    .task-list { padding: 0; overflow: hidden; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--separator);
      cursor: pointer;
      background: transparent;
      transition: background 0.1s ease;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: var(--bg-tertiary); }
    .task-item:active { background: var(--bg-tertiary); }

    .checkbox {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid var(--separator-opaque);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: all 0.15s ease;
    }
    .checkbox svg {
      width: 12px;
      height: 12px;
      stroke: #fff;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
      transition: stroke-dashoffset 0.2s ease 0.04s;
    }
    .task-item.done .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }
    .task-item.done .checkbox svg { stroke-dashoffset: 0; }

    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.1px;
    }
    .task-item.done .task-title {
      color: var(--text-tertiary);
      text-decoration: line-through;
    }
    .cat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cat-dot.work     { background: var(--system-blue); }
    .cat-dot.personal { background: var(--system-pink); }
    .cat-dot.study    { background: var(--system-purple); }
    .cat-dot.schedule { background: var(--system-orange); }

    .task-meta {
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--bg-tertiary);
      border: 1px solid var(--separator);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .task-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }
    .icon-btn {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .icon-btn:active { background: var(--bg-tertiary); }
    .icon-btn.danger { color: var(--system-red); }
    .icon-btn.danger:hover { color: #fff; background: var(--system-red); }

    /* ---------- Empty State ---------- */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty .emoji { font-size: 36px; }
    .empty .msg {
      margin-top: 8px;
      font-size: 15px;
      font-weight: 500;
    }
    .task-list:empty::after { content: none; }

    /* ---------- Modal / Sheet ---------- */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, var(--backdrop-alpha));
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 100;
    }
    .backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 520px;
      margin: 0 auto;
      background: var(--bg-secondary);
      border: 1px solid var(--separator);
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.25);
      padding: 8px 18px calc(var(--safe-bottom) + 20px);
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 101;
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 32px;
      height: 3px;
      border-radius: 2px;
      background: var(--separator-opaque);
      margin: 6px auto 12px;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--separator);
    }
    .sheet-header .title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.1px;
      color: var(--text-primary);
    }
    .sheet-header button {
      border: 1px solid var(--separator);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .sheet-header button:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .sheet-header button.primary {
      background: var(--accent);
      border-color: var(--accent-hover);
      color: #fff;
    }
    .sheet-header button.primary:hover { background: var(--accent-hover); color: #fff; }
    .sheet-header button:disabled {
      background: var(--bg-tertiary);
      border-color: var(--separator);
      color: var(--text-tertiary);
      cursor: not-allowed;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 10.5px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
      padding-left: 1px;
    }
    .field input[type="text"],
    .field input[type="date"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--separator);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: inherit;
      /* iOS Safari 자동 확대 방지 (최소 16px) */
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 6px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.12s ease, box-shadow 0.12s ease;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
    }

    .segmented.in-sheet {
      margin: 0;
    }

    .field.row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field.row2 .sub { display: flex; flex-direction: column; }
    .field.row2.single { grid-template-columns: 1fr; }

    /* Color swatches */
    .swatches {
      display: flex;
      gap: 8px;
    }
    .swatch {
      flex: 1;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--separator);
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease;
    }
    .swatch .fill {
      width: 100%;
      height: 100%;
      border-radius: 5px;
    }
    .swatch.active {
      border-color: var(--text-primary);
      box-shadow: 0 0 0 2px var(--bg-secondary), 0 0 0 3px var(--text-primary);
    }
    .swatch:active { transform: scale(0.96); }

    .inline-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      user-select: none;
    }
    .inline-check input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
      margin: 0;
    }
    .lunar-preview {
      margin-top: 6px;
      padding-left: 23px;
      font-size: 11.5px;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      min-height: 14px;
    }

    .delete-row {
      border-top: 1px solid var(--separator);
      padding-top: 12px;
      margin-top: 4px;
    }
    .delete-btn {
      width: 100%;
      padding: 9px;
      background: transparent;
      border: 1px solid var(--separator);
      color: var(--system-red);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .delete-btn:hover { background: rgba(230, 92, 92, 0.08); }

    body.modal-open { overflow: hidden; touch-action: none; }

    /* ---------- Install banner ---------- */
    .install-banner {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      max-width: 520px;
      margin: 0 auto;
      background: var(--bg-secondary);
      border: 1px solid var(--separator);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-secondary);
      z-index: 50;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }
    .install-banner .msg { flex: 1; line-height: 1.4; }
    .install-banner .msg strong { color: var(--text-primary); font-weight: 600; }
    .install-banner button {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .install-banner button:hover { color: var(--text-primary); background: var(--bg-tertiary); }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-secondary);
      border: 1px solid var(--separator);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      z-index: 200;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
      max-width: 90vw;
    }
    .toast.error {
      border-color: var(--system-red);
      color: var(--system-red);
    }

    /* ---------- Install guide modal ---------- */
    .install-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, var(--backdrop-alpha));
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 103;
      padding: 20px;
    }
    .install-modal.open { display: flex; }
    .install-modal-body {
      background: var(--bg-secondary);
      border: 1px solid var(--separator);
      border-radius: 10px;
      padding: 18px 18px 16px;
      max-width: 360px;
      width: 100%;
    }
    .install-modal-body h3 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .install-modal-body ol {
      margin: 0 0 14px;
      padding-left: 20px;
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.7;
    }
    .install-modal-body ol li::marker { color: var(--accent); font-weight: 600; }
    .install-url-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .install-url-row input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--separator);
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 11px;
      padding: 7px 9px;
      border-radius: 5px;
      outline: none;
    }
    .install-url-row button,
    .install-modal-body .close-btn {
      border: 1px solid var(--separator);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 12px;
      border-radius: 5px;
      cursor: pointer;
      white-space: nowrap;
    }
    .install-url-row button:hover,
    .install-modal-body .close-btn:hover { background: var(--bg-tertiary); }
    .install-modal-body .close-btn {
      width: 100%;
      padding: 9px;
    }

    /* ---------- Notification dot on settings ---------- */
    .nav-btn { position: relative; }
    .nav-btn.has-notif::after {
      content: '';
      position: absolute;
      top: 1px;
      right: 1px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 1.5px var(--bg-primary);
    }
  </style>
</head>
<body>
  <div class="app" id="appContainer">
    <div class="ptr-indicator" id="ptrIndicator"><span class="ptr-arrow">↓</span><span class="ptr-text">당겨서 새로고침</span></div>
    <section class="top-pane" aria-label="월간 캘린더">
      <div class="month-nav">
        <div class="month-title" id="monthTitle"></div>
        <div class="nav-actions">
          <button type="button" class="nav-btn primary" id="addEventBtn" aria-label="일정 추가">
            <svg viewBox="0 0 20 20"><rect x="3" y="4.5" width="14" height="13" rx="2"></rect><path d="M3 8h14"></path><path d="M7 3v3"></path><path d="M13 3v3"></path><path d="M10 11v4"></path><path d="M8 13h4"></path></svg>
          </button>
          <button type="button" class="nav-btn" id="prevMonth" aria-label="이전 달">
            <svg viewBox="0 0 20 20"><path d="M12 5l-5 5 5 5"></path></svg>
          </button>
          <button type="button" class="nav-btn" id="nextMonth" aria-label="다음 달">
            <svg viewBox="0 0 20 20"><path d="M8 5l5 5-5 5"></path></svg>
          </button>
          <button type="button" class="nav-btn" id="settingsBtn" aria-label="설정">
            <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="2.4"></circle><path d="M10 2.5v2M10 15.5v2M2.5 10h2M15.5 10h2M4.7 4.7l1.4 1.4M13.9 13.9l1.4 1.4M4.7 15.3l1.4-1.4M13.9 6.1l1.4-1.4"></path></svg>
          </button>
        </div>
      </div>
      <div class="weekday-header">
        <div class="wh sun">일</div>
        <div class="wh">월</div>
        <div class="wh">화</div>
        <div class="wh">수</div>
        <div class="wh">목</div>
        <div class="wh">금</div>
        <div class="wh sat">토</div>
      </div>
      <div class="month-grid" id="monthGrid"></div>
    </section>

    <div class="hairline"></div>

    <section class="bottom-pane" id="bottomPane">
      <header class="header">
        <div class="header-date">
          <div class="label" id="todayLabel">TODAY</div>
          <div class="title" id="todayDate"></div>
        </div>
        <div class="progress-ring" id="progressRing" aria-label="진행률"></div>
      </header>

      <div class="weather-bar" id="weatherBar" aria-label="날씨"></div>

      <section class="week-strip" id="weekStrip" aria-label="주간 캘린더"></section>

      <div class="segmented" id="categoryFilter" role="tablist"></div>

      <main class="task-list" id="taskList" aria-label="할 일 목록"></main>
    </section>

    <button class="fab" id="addButton" aria-label="할 일 추가">+</button>
  </div>

  <div class="settings-menu" id="settingsMenu" role="menu">
    <button type="button" id="settingsTheme">
      <span id="settingsThemeLabel">다크 모드</span>
      <span class="chk"></span>
    </button>
    <div class="sep"></div>
    <button type="button" id="settingsRefresh">위치 새로고침</button>
    <button type="button" id="settingsCity">도시 수동 입력</button>
    <div class="sep"></div>
    <button type="button" id="settingsToggleWeather">
      <span>날씨 표시</span>
      <span class="chk"></span>
    </button>
    <div class="sep"></div>
    <button type="button" id="settingsExport">지금 백업 (JSON 다운로드)</button>
    <button type="button" id="settingsImport">복원 (JSON 가져오기)</button>
    <div class="sep"></div>
    <button type="button" id="settingsInstall">홈 화면 추가 방법</button>
  </div>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none" />

  <div class="install-banner" id="installBanner" style="display:none">
    <div class="msg"><strong>홈 화면에 추가</strong>하면 앱처럼 사용할 수 있어요.<br>공유 버튼 → "홈 화면에 추가"</div>
    <button type="button" id="installBannerClose" aria-label="닫기">×</button>
  </div>

  <div class="install-modal" id="installModal" role="dialog" aria-modal="true">
    <div class="install-modal-body">
      <h3>홈 화면에 추가하기</h3>
      <ol>
        <li>Safari 하단 <strong>공유 버튼</strong> 탭</li>
        <li>목록에서 <strong>"홈 화면에 추가"</strong> 선택</li>
        <li>우측 상단 <strong>"추가"</strong> 탭 → 아이콘 생성 완료</li>
      </ol>
      <div class="install-url-row">
        <input type="text" id="installUrl" readonly />
        <button type="button" id="installCopyBtn">URL 복사</button>
      </div>
      <button type="button" class="close-btn" id="installCloseBtn">닫기</button>
    </div>
  </div>

  <div class="backdrop" id="backdrop"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button type="button" id="cancelBtn">취소</button>
      <div class="title" id="sheetTitle">새 할 일</div>
      <button type="button" class="primary" id="saveBtn" disabled>저장</button>
    </div>

    <div class="field">
      <label for="titleInput">제목</label>
      <input type="text" id="titleInput" placeholder="무엇을 하실 건가요?" autocomplete="off" />
    </div>

    <div class="field">
      <label>카테고리</label>
      <div class="segmented in-sheet" id="catSeg"></div>
    </div>

    <div class="field">
      <label>반복</label>
      <div class="segmented in-sheet" id="typeSeg"></div>
    </div>

    <div class="field" id="dateField">
      <label for="dateInput">날짜</label>
      <input type="date" id="dateInput" />
    </div>
  </div>

  <div class="sheet" id="eventSheet" role="dialog" aria-modal="true" aria-labelledby="eventSheetTitle">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button type="button" id="evtCancelBtn">취소</button>
      <div class="title" id="eventSheetTitle">새 일정</div>
      <button type="button" class="primary" id="evtSaveBtn" disabled>저장</button>
    </div>

    <div class="field">
      <label>유형</label>
      <div class="segmented in-sheet" id="evtKindSeg"></div>
    </div>

    <div class="field">
      <label for="evtTitleInput">제목</label>
      <input type="text" id="evtTitleInput" placeholder="일정 이름" autocomplete="off" />
    </div>

    <div class="field">
      <label>색상</label>
      <div class="swatches" id="evtSwatches"></div>
    </div>

    <div class="field" id="evtRangeField">
      <label>기간</label>
      <div class="segmented in-sheet" id="evtRangeSeg"></div>
    </div>

    <div class="field row2" id="evtDateFields">
      <div class="sub">
        <label for="evtStartInput">시작일</label>
        <input type="date" id="evtStartInput" />
      </div>
      <div class="sub" id="evtEndWrap">
        <label for="evtEndInput">종료일</label>
        <input type="date" id="evtEndInput" />
      </div>
    </div>

    <div class="field" id="evtLunarRow" style="display:none">
      <label class="inline-check">
        <input type="checkbox" id="evtLunarBox"> 음력 날짜로 입력 (매년 양력 날짜가 달라짐)
      </label>
      <div class="lunar-preview" id="evtLunarPreview"></div>
    </div>

    <div class="field" id="evtCompleteRow" style="display:none">
      <label class="inline-check">
        <input type="checkbox" id="evtCompleteBox"> 완료 처리
      </label>
    </div>

    <div class="delete-row" id="evtDeleteRow" style="display:none">
      <button type="button" class="delete-btn" id="evtDeleteBtn">일정 삭제</button>
    </div>
  </div>

  <script>
    /**
     * @typedef {"work" | "personal" | "study"} Category
     * @typedef {"once" | "daily" | "weekdays" | "weekends"} TaskType
     * @typedef {Object} Task
     * @property {string} id
     * @property {string} title
     * @property {Category} category
     * @property {TaskType} type
     * @property {string} date            - "YYYY-MM-DD" (once 타입에서만 의미)
     * @property {boolean} completed      - once 타입에서만 사용
     * @property {Object.<string, boolean>} completionMap - 루틴용 날짜별 완료 상태
     * @property {string} createdAt       - ISO string
     */

    // ---------- UUID ----------
    function uuid() {
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      // RFC4122 v4 fallback
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
        const r = (Math.random() * 16) | 0;
        const v = c === 'x' ? r : (r & 0x3) | 0x8;
        return v.toString(16);
      });
    }

    // ---------- Lunar Calendar (1900 ~ 2100) ----------
    // 한국천문연구원 기준 음력 정보표. 비트:
    //   bit 16: 윤달이 30일(1)/29일(0)
    //   bit 15..4: 1~12월, 1=30일 / 0=29일
    //   bit 3..0: 윤달 번호 (0 = 윤달 없음)
    const LUNAR_INFO = [
      0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
      0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
      0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
      0x06566,0x0d4a0,0x0ea50,0x16a95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
      0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
