      0x0d520
    ];
    const LUNAR_YEAR_MIN = 1900;
    const LUNAR_YEAR_MAX = LUNAR_YEAR_MIN + LUNAR_INFO.length - 1;

    function lunarLeapMonth(y) {
      return LUNAR_INFO[y - LUNAR_YEAR_MIN] & 0xf;
    }
    function lunarLeapDays(y) {
      return lunarLeapMonth(y) ? ((LUNAR_INFO[y - LUNAR_YEAR_MIN] & 0x10000) ? 30 : 29) : 0;
    }
    function lunarMonthDays(y, m) {
      return (LUNAR_INFO[y - LUNAR_YEAR_MIN] & (0x10000 >> m)) ? 30 : 29;
    }
    function lunarYearTotalDays(y) {
      let sum = 348;
      for (let i = 0x8000; i > 0x8; i >>= 1) {
        if (LUNAR_INFO[y - LUNAR_YEAR_MIN] & i) sum++;
      }
      return sum + lunarLeapDays(y);
    }

    /** 음력 -> 양력 */
    function lunarToSolar(ly, lm, ld, isLeap) {
      if (ly < LUNAR_YEAR_MIN || ly > LUNAR_YEAR_MAX) {
        console.warn('[lunar] lunarToSolar out of range:', ly);
        return { year: ly, month: lm, day: Math.min(ld, 28) };
      }
      const lp = lunarLeapMonth(ly);
      let maxD;
      if (isLeap && lp === lm) maxD = lunarLeapDays(ly);
      else maxD = lunarMonthDays(ly, lm);
      if (ld > maxD) ld = maxD;

      let offset = 0;
      for (let y = LUNAR_YEAR_MIN; y < ly; y++) offset += lunarYearTotalDays(y);
      for (let m = 1; m < lm; m++) {
        offset += lunarMonthDays(ly, m);
        if (m === lp) offset += lunarLeapDays(ly);
      }
      if (isLeap && lp === lm) {
        offset += lunarMonthDays(ly, lm);
      }
      offset += ld - 1;
      const solar = new Date(1900, 0, 31 + offset);
      return { year: solar.getFullYear(), month: solar.getMonth() + 1, day: solar.getDate() };
    }

    /** 양력 -> 음력 */
    function solarToLunar(sy, sm, sd) {
      if (sy < LUNAR_YEAR_MIN || sy > LUNAR_YEAR_MAX) {
        console.warn('[lunar] solarToLunar out of range:', sy);
        return { year: sy, month: sm, day: sd, isLeap: false };
      }
      const target = new Date(sy, sm - 1, sd);
      const base = new Date(1900, 0, 31);
      let offset = Math.floor((target - base) / 86400000);
      if (offset < 0) {
        console.warn('[lunar] date before 1900-01-31');
        return { year: sy, month: sm, day: sd, isLeap: false };
      }
      let y = LUNAR_YEAR_MIN;
      while (y <= LUNAR_YEAR_MAX) {
        const yd = lunarYearTotalDays(y);
        if (offset < yd) break;
        offset -= yd;
        y++;
      }
      const lp = lunarLeapMonth(y);
      let m = 1;
      let isLeap = false;
      let leapDone = false;
      while (m <= 12 && offset >= 0) {
        if (lp > 0 && !leapDone && m === lp + 1) {
          const ldays = lunarLeapDays(y);
          if (offset < ldays) {
            isLeap = true;
            m = lp;
            break;
          }
          offset -= ldays;
          leapDone = true;
        }
        const md = lunarMonthDays(y, m);
        if (offset < md) break;
        offset -= md;
        m++;
      }
      return { year: y, month: m, day: offset + 1, isLeap };
    }

    function formatLunarKorean(ly, lm, ld, isLeap) {
      return `음력 ${ly}년 ${isLeap ? '윤' : ''}${lm}월 ${ld}일`;
    }

    // ---------- Date Utils ----------
    function pad2(n) { return n < 10 ? '0' + n : '' + n; }

    function toDateStr(d) {
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }

    function todayStr() { return toDateStr(new Date()); }

    /**
     * 해당 날짜에 이 할 일이 표시돼야 하는지 판별
     * @param {Task} task
     * @param {string} dateStr "YYYY-MM-DD"
     */
    function isTaskOnDate(task, dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const day = new Date(y, m - 1, d).getDay(); // 0=일, 6=토
      switch (task.type) {
        case 'once':     return task.date === dateStr;
        case 'daily':    return true;
        case 'weekdays': return day >= 1 && day <= 5;
        case 'weekends': return day === 0 || day === 6;
        default:         return false;
      }
    }

    // ---------- Store ----------
    const Store = (function () {
      const KEY = 'dayflow.tasks';

      function load() {
        try {
          const raw = localStorage.getItem(KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          console.warn('[Store] load failed:', e);
          return [];
        }
      }

      function save(tasks) {
        // LS + IDB + snapshot 모두 처리
        if (typeof persistSave === 'function') {
          persistSave(KEY, tasks);
          return;
        }
        try { localStorage.setItem(KEY, JSON.stringify(tasks)); }
        catch (e) { console.warn('[Store] save failed:', e); }
      }

      function add(partial) {
        const task = {
          id: partial.id || uuid(),
          title: partial.title || '',
          category: partial.category || 'personal',
          type: partial.type || 'once',
          date: partial.date || todayStr(),
          completed: false,
          completionMap: partial.completionMap || {},
          createdAt: new Date().toISOString()
        };
        state.tasks.push(task);
        save(state.tasks);
        return task;
      }

      function update(id, patch) {
        const i = state.tasks.findIndex((t) => t.id === id);
        if (i < 0) return null;
        state.tasks[i] = Object.assign({}, state.tasks[i], patch);
        save(state.tasks);
        return state.tasks[i];
      }

      function remove(id) {
        const before = state.tasks.length;
        state.tasks = state.tasks.filter((t) => t.id !== id);
        if (state.tasks.length !== before) save(state.tasks);
      }

      function toggleComplete(id, dateStr) {
        const task = state.tasks.find((t) => t.id === id);
        if (!task) return null;
        if (task.type === 'once') {
          task.completed = !task.completed;
        } else {
          const key = dateStr || todayStr();
          task.completionMap = task.completionMap || {};
          task.completionMap[key] = !task.completionMap[key];
        }
        save(state.tasks);
        return task;
      }

      return { load, save, add, update, remove, toggleComplete };
    })();

    // ---------- Events Store ----------
    /**
     * @typedef {Object} EventItem
     * @property {string} id
     * @property {string} title
     * @property {string} startDate    - "YYYY-MM-DD"
     * @property {string} endDate      - "YYYY-MM-DD" (startDate와 같으면 하루짜리)
     * @property {string} color        - "rgb(r, g, b)"
     * @property {string} createdAt
     */

    const EVENT_COLORS = [
      'rgb(94, 106, 210)',
      'rgb(230, 92, 92)',
      'rgb(74, 180, 130)'
    ];

    const EVENT_DEFAULTS = {
      kind: 'normal',
      recurring: false,
      calendarType: 'solar',
      lunarMonth: null,
      lunarDay: null,
      lunarIsLeap: false
    };

    function normalizeEvent(e) {
      return Object.assign({}, EVENT_DEFAULTS, e);
    }

    const Events = (function () {
      const KEY = 'dayflow.events';

      function load() {
        try {
          const raw = localStorage.getItem(KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed.map(normalizeEvent);
        } catch (e) {
          console.warn('[Events] load failed:', e);
          return [];
        }
      }

      function save(list) {
        if (typeof persistSave === 'function') {
          persistSave(KEY, list);
          return;
        }
        try { localStorage.setItem(KEY, JSON.stringify(list)); }
        catch (e) { console.warn('[Events] save failed:', e); }
      }

      function add(partial) {
        const start = partial.startDate || todayStr();
        const kind = partial.kind || 'normal';
        const isSpecial = kind !== 'normal';
        const end = isSpecial ? start : (partial.endDate || start);
        const ev = {
          id: partial.id || uuid(),
          title: partial.title || '',
          startDate: start,
          endDate: end,
          color: partial.color || EVENT_COLORS[0],
          kind,
          recurring: isSpecial ? true : !!partial.recurring,
          calendarType: partial.calendarType || 'solar',
          lunarMonth: partial.lunarMonth ?? null,
          lunarDay: partial.lunarDay ?? null,
          lunarIsLeap: !!partial.lunarIsLeap,
          createdAt: new Date().toISOString()
        };
        state.events.push(ev);
        save(state.events);
        return ev;
      }

      function update(id, patch) {
        const i = state.events.findIndex((e) => e.id === id);
        if (i < 0) return null;
        const merged = Object.assign({}, state.events[i], patch);
        // kind==='normal'이 아니면 recurring 강제 true, 기간은 startDate로 고정
        if (merged.kind && merged.kind !== 'normal') {
          merged.recurring = true;
          merged.endDate = merged.startDate;
        }
        state.events[i] = normalizeEvent(merged);
        save(state.events);
        return state.events[i];
      }

      function remove(id) {
        const before = state.events.length;
        state.events = state.events.filter((e) => e.id !== id);
        if (state.events.length !== before) save(state.events);
      }

      return { load, save, add, update, remove };
    })();

    // ---------- Persistence (IndexedDB mirror + snapshots) ----------
    const Persistence = (function () {
      const DB_NAME = 'dayflow';
      const STORE = 'kv';
      let dbPromise = null;
      let available = false;

      function openDB() {
        if (dbPromise) return dbPromise;
        dbPromise = new Promise((resolve, reject) => {
          if (!('indexedDB' in window)) { reject(new Error('no-idb')); return; }
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
          };
          req.onsuccess = () => { available = true; resolve(req.result); };
          req.onerror = () => reject(req.error);
        }).catch((e) => { console.warn('[idb] unavailable:', e && e.message); return null; });
        return dbPromise;
      }

      async function set(key, value) {
        const db = await openDB();
        if (!db) return;
        return new Promise((resolve) => {
          try {
            const tx = db.transaction(STORE, 'readwrite');
            tx.objectStore(STORE).put(value, key);
            tx.oncomplete = () => resolve();
            tx.onerror = () => resolve();
          } catch (e) { resolve(); }
        });
      }

      async function get(key) {
        const db = await openDB();
        if (!db) return undefined;
        return new Promise((resolve) => {
          try {
            const tx = db.transaction(STORE, 'readonly');
            const req = tx.objectStore(STORE).get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve(undefined);
          } catch (e) { resolve(undefined); }
        });
      }

      function mirror(key, wrapped) {
        // fire-and-forget async write
        set(key, wrapped).catch(() => {});
      }

      function isAvailable() { return available; }

      // Eagerly open on module init
      openDB();

      return { get, set, mirror, isAvailable };
    })();

    // ---------- Toast ----------
    function showToast(msg, kind) {
      const existing = document.getElementById('__toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.id = '__toast';
      toast.className = 'toast' + (kind ? ' ' + kind : '');
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 4000);
    }

    // ---------- Snapshots ----------
    function updateSnapshots() {
      try {
        const payload = {
          savedAt: Date.now(),
          tasks: state.tasks,
          events: state.events
        };
        const str = JSON.stringify(payload);
        localStorage.setItem('dayflow.snapshot.latest', str);

        const dailyKey = 'dayflow.snapshot.daily.' + todayStr();
        if (!localStorage.getItem(dailyKey)) {
          localStorage.setItem(dailyKey, str);
          pruneDailySnapshots();
        }
      } catch (e) {
        console.warn('[snapshot] failed:', e);
      }
    }

    function pruneDailySnapshots() {
      const prefix = 'dayflow.snapshot.daily.';
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.indexOf(prefix) === 0) keys.push(k);
      }
      keys.sort();
      while (keys.length > 7) {
        try { localStorage.removeItem(keys.shift()); } catch (_) {}
      }
    }

    /** LS + IDB 동시 저장 + 스냅샷 갱신. Store/Events.save 내부에서 사용 */
    function persistSave(key, value) {
      const savedAt = Date.now();
      try {
        localStorage.setItem(key, JSON.stringify(value));
        localStorage.setItem(key + '.savedAt', String(savedAt));
      } catch (e) {
        console.warn('[persist] LS write failed:', e);
        if (e && (e.name === 'QuotaExceededError' || e.name === 'SecurityError' ||
                  e.code === 22 || e.code === 1014)) {
          showToast('저장 실패 — 데이터 내보내기를 해 두세요', 'error');
        }
      }
      Persistence.mirror(key, { savedAt, value });
      updateSnapshots();
    }

    function parseRgb(str) {
      const m = String(str).match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
      return m ? { r: +m[1], g: +m[2], b: +m[3] } : { r: 94, g: 106, b: 210 };
    }
    function eventChipStyle(colorStr) {
      const { r, g, b } = parseRgb(colorStr);
      const alpha = getComputedStyle(document.documentElement).getPropertyValue('--chip-bg-alpha').trim() || '0.18';
      return `background: rgba(${r},${g},${b},${alpha}); color: rgb(${r},${g},${b}); border-left-color: rgb(${r},${g},${b});`;
    }

    // ---------- Event helpers ----------
    function categoryForEventColor(color) {
      const { r, g, b } = parseRgb(color);
      if (r === 94 && g === 106 && b === 210) return 'work';     // 퍼플 → 업무
      if (r === 230 && g === 92 && b === 92)  return 'personal'; // 레드 → 개인
      if (r === 74 && g === 180 && b === 130) return 'study';    // 그린 → 공부
      return 'work';
    }

    function eventEmoji(ev) {
      if (ev.kind === 'birthday')    return '🎂 ';
      if (ev.kind === 'anniversary') return '🎉 ';
      return '';
    }
    function eventDisplayTitle(ev) {
      return eventEmoji(ev) + (ev.title || '');
    }
    function chipDisplayText(ev, dateStr) {
      let text = eventDisplayTitle(ev);
      if (ev.recurring && ev.calendarType === 'lunar' && ev.lunarIsLeap) {
        const [y] = dateStr.split('-').map(Number);
        if (lunarLeapMonth(y) !== ev.lunarMonth) text += ' (평달)';
      }
      return text;
    }

    /** 주어진 Event가 해당 날짜에 발생하는지 (일반/solar/lunar 모두 지원) */
    function eventOccursOn(ev, dateStr) {
      if (!ev.recurring) {
        return ev.startDate <= dateStr && dateStr <= ev.endDate;
      }
      const [y, m, d] = dateStr.split('-').map(Number);
      if (ev.calendarType === 'solar') {
        const [, sm, sd] = ev.startDate.split('-').map(Number);
        if (m === sm && d === sd) return true;
        // 2월 29일 양력 생일 → 비윤년은 2월 28일
        if (sm === 2 && sd === 29) {
          const isLeapY = (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
          if (!isLeapY && m === 2 && d === 28) return true;
        }
        return false;
      }
      // lunar
      if (ev.lunarMonth == null || ev.lunarDay == null) return false;
      let lm = ev.lunarMonth, ld = ev.lunarDay, isLeap = ev.lunarIsLeap;
      // 해당 연도에 윤달이 없으면 평달로 fallback
      if (isLeap && lunarLeapMonth(y) !== lm) isLeap = false;
      const maxD = isLeap ? lunarLeapDays(y) : lunarMonthDays(y, lm);
      if (ld > maxD) ld = maxD; // 30일 없는 달은 29일로
      const s = lunarToSolar(y, lm, ld, isLeap);
      return s.year === y && s.month === m && s.day === d;
    }

    /** 주어진 양력 연도에 대한 반복 Event의 발생 양력 날짜 ("YYYY-MM-DD") */
    function recurringOccurrenceForYear(ev, year) {
      if (ev.calendarType === 'solar') {
        const [, sm, sd] = ev.startDate.split('-').map(Number);
        let mm = sm, dd = sd;
        if (sm === 2 && sd === 29) {
          const isLeapY = (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
          if (!isLeapY) dd = 28;
        }
        return toDateStr(new Date(year, mm - 1, dd));
      }
      if (ev.lunarMonth == null || ev.lunarDay == null) return null;
      let lm = ev.lunarMonth, ld = ev.lunarDay, isLeap = ev.lunarIsLeap;
      if (isLeap && lunarLeapMonth(year) !== lm) isLeap = false;
      const maxD = isLeap ? lunarLeapDays(year) : lunarMonthDays(year, lm);
      if (ld > maxD) ld = maxD;
      const s = lunarToSolar(year, lm, ld, isLeap);
      return toDateStr(new Date(s.year, s.month - 1, s.day));
    }

    /** 해당 날짜에 발생하는 모든 Event 인스턴스 */
    function eventsOnDate(dateStr) {
      return state.events.filter((e) => eventOccursOn(e, dateStr));
    }

    /** linkedEventId + date 조합에 해당하는 Task 찾기 */
    function findLinkedTask(eventId, dateStr) {
      return state.tasks.find((t) =>
        t.linkedEventId === eventId && t.type === 'once' && t.date === dateStr
      );
    }

    /** Event에 연결된 Task를 전부 삭제 */
    function removeLinkedTasks(eventId) {
      const before = state.tasks.length;
      state.tasks = state.tasks.filter((t) => t.linkedEventId !== eventId);
      if (state.tasks.length !== before) Store.save(state.tasks);
    }

    /** Event를 Task로 동기화 (기존 연결 Task 제거 후 재생성) */
    function rebuildLinkedTasksForEvent(ev) {
      // 기존 연결 Task 제거
      state.tasks = state.tasks.filter((t) => t.linkedEventId !== ev.id);
      if (!ev.recurring) {
        // 일반 Event: startDate ~ endDate 전 범위에 대해 eager 생성
        const [sy, sm, sd] = ev.startDate.split('-').map(Number);
        const [ey, em, ed] = ev.endDate.split('-').map(Number);
        const start = new Date(sy, sm - 1, sd);
        const end = new Date(ey, em - 1, ed);
        for (let cur = new Date(start); cur <= end; cur.setDate(cur.getDate() + 1)) {
          state.tasks.push(makeLinkedTask(ev, toDateStr(cur)));
        }
      }
      // 반복 Event는 여기서 미리 만들지 않음 — 주간 렌더 시 lazy 생성
      Store.save(state.tasks);
    }

    function makeLinkedTask(ev, dateStr) {
      return {
        id: uuid(),
        title: chipDisplayText(ev, dateStr),
        category: 'schedule',
        type: 'once',
        date: dateStr,
        completed: false,
        completionMap: {},
        createdAt: new Date().toISOString(),
        linkedEventId: ev.id,
        source: 'event'
      };
    }

    /** 주어진 날짜들에 대해 반복 Event의 linked Task를 lazy 생성 */
    function ensureLinkedTasksForDates(dateList) {
      let changed = false;
      for (const ds of dateList) {
        for (const ev of state.events) {
          if (!ev.recurring) continue;
          if (!eventOccursOn(ev, ds)) continue;
          if (findLinkedTask(ev.id, ds)) continue;
          state.tasks.push(makeLinkedTask(ev, ds));
          changed = true;
        }
      }
      if (changed) Store.save(state.tasks);
    }

    // ---------- Global State ----------
    const state = {
      tasks: [],
      selectedDate: todayStr(),
      viewMonth: (() => {
        const n = new Date();
        return { year: n.getFullYear(), month: n.getMonth() };
      })()
    };

    state.tasks = Store.load();
    state.events = Events.load();

    // 기존 event-linked task의 카테고리를 schedule로 마이그레이션
    (function () {
      let changed = false;
      for (const t of state.tasks) {
        if (t.source === 'event' && t.category !== 'schedule') {
          t.category = 'schedule';
          changed = true;
        }
      }
      if (changed) Store.save(state.tasks);
    })();

    function setSelectedDate(ds) {
      state.selectedDate = ds;
      const [y, m] = ds.split('-').map(Number);
      if (state.viewMonth.year !== y || state.viewMonth.month !== m - 1) {
        state.viewMonth = { year: y, month: m - 1 };
      }
    }

    // ---------- Filter state ----------
    state.filter = 'all'; // all | work | personal | study

    const CATEGORIES = [
      { key: 'all',      label: '전체' },
      { key: 'work',     label: '업무' },
      { key: 'personal', label: '개인' },
      { key: 'study',    label: '공부' },
      { key: 'schedule', label: '일정' }
    ];

    const WEEKDAY_LABELS = ['일', '월', '화', '수', '목', '금', '토'];

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function isTaskCompletedOn(task, dateStr) {
      if (task.type === 'once') return !!task.completed;
      return !!(task.completionMap && task.completionMap[dateStr]);
    }

    function getWeekDates(baseStr) {
      const [y, m, d] = baseStr.split('-').map(Number);
      const base = new Date(y, m - 1, d);
      const sunday = new Date(base);
      sunday.setDate(base.getDate() - base.getDay());
      const out = [];
      for (let i = 0; i < 7; i++) {
        const dt = new Date(sunday);
        dt.setDate(sunday.getDate() + i);
        out.push(dt);
      }
      return out;
    }

    function tasksForDate(dateStr) {
      return state.tasks.filter((t) => isTaskOnDate(t, dateStr));
    }

    // ---------- Renderers ----------
    function renderHeader() {
      const el = document.getElementById('todayDate');
      const [y, m, d] = state.selectedDate.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      el.textContent = dt.toLocaleDateString('ko-KR', {
        month: 'long', day: 'numeric', weekday: 'long'
      });
      document.getElementById('todayLabel').textContent =
        state.selectedDate === todayStr() ? 'TODAY' : 'SELECTED';
    }

    function renderProgressRing() {
      const container = document.getElementById('progressRing');
      const list = tasksForDate(state.selectedDate);
      const done = list.filter((t) => isTaskCompletedOn(t, state.selectedDate)).length;
      const pct = list.length === 0 ? 0 : Math.round((done / list.length) * 100);
      const r = 26;
      const c = 2 * Math.PI * r;
      const offset = c * (1 - pct / 100);
      container.innerHTML = `
        <svg viewBox="0 0 60 60">
          <circle class="track" cx="30" cy="30" r="${r}"></circle>
          <circle class="bar" cx="30" cy="30" r="${r}"
            stroke-dasharray="${c - offset} ${c}"></circle>
        </svg>
        <div class="label">${pct}%</div>
      `;
    }

    function renderWeekStrip() {
      const el = document.getElementById('weekStrip');
      const dates = getWeekDates(state.selectedDate);
      const today = todayStr();
      el.innerHTML = dates.map((dt) => {
        const ds = toDateStr(dt);
        const dayEvents = eventsOnDate(ds);
        const classes = ['week-day'];
        if (ds === state.selectedDate) classes.push('selected');
        if (ds === today) classes.push('today');
        if (dayEvents.length > 0) classes.push('has-events');

        // 일정 라벨 최대 3개 표시
        const evtHtml = dayEvents.slice(0, 3).map((ev) => {
          const label = chipDisplayText(ev, ds);
          const shortLabel = label.length > 5 ? label.slice(0, 5) + '…' : label;
          return `<div class="evt-label" title="${escapeHtml(label)}">${escapeHtml(shortLabel)}</div>`;
        }).join('');

        return `
          <div class="${classes.join(' ')}" data-date="${ds}">
            <div class="wd">${WEEKDAY_LABELS[dt.getDay()]}</div>
            <div class="dd">${dt.getDate()}</div>
            <div class="dot"></div>
            ${evtHtml}
          </div>
        `;
      }).join('');
    }

    function renderCategoryFilter() {
      const el = document.getElementById('categoryFilter');
      el.innerHTML = CATEGORIES.map((c) => `
        <button class="${state.filter === c.key ? 'active' : ''}" data-cat="${c.key}">
          ${c.label}
        </button>
      `).join('');
    }

    function renderTaskList() {
      const el = document.getElementById('taskList');
      let list = tasksForDate(state.selectedDate);
      if (state.filter !== 'all') {
        list = list.filter((t) => t.category === state.filter);
      }

      if (list.length === 0) {
        el.innerHTML = `
          <div class="empty">
            <div class="emoji">☀️</div>
            <div class="msg">오늘은 여유로운 하루</div>
          </div>
        `;
        return;
      }

      const ROUTINE_LABELS = { daily: 'DAILY', weekdays: 'WEEKDAYS', weekends: 'WEEKENDS' };

      el.innerHTML = list.map((t) => {
        const done = isTaskCompletedOn(t, state.selectedDate);
        const routineBadge = t.type !== 'once'
          ? `<span class="badge">${ROUTINE_LABELS[t.type]}</span>`
          : '';
        const eventBadge = t.source === 'event'
          ? `<span class="badge">EVENT</span>`
          : '';
        const metaHtml = (routineBadge || eventBadge)
          ? `<div class="task-meta">${routineBadge}${eventBadge}</div>`
          : '';
        const actions = t.source === 'event'
          ? ''
          : `<button class="icon-btn danger" data-action="delete" aria-label="삭제">✕</button>`;
        return `
          <div class="task-item ${done ? 'done' : ''}" data-id="${t.id}">
            <div class="checkbox" data-action="toggle">
              <svg viewBox="0 0 20 20"><polyline points="4,11 8,15 16,6"></polyline></svg>
            </div>
            <div class="task-body">
              <div class="task-title">
                <span class="cat-dot ${t.category}"></span>
                <span>${escapeHtml(t.title)}</span>
              </div>
              ${metaHtml}
            </div>
            <div class="task-actions">${actions}</div>
          </div>
        `;
      }).join('');
    }

    // ---------- Month Grid ----------
    function getMonthCells(year, month) {
      const first = new Date(year, month, 1);
      const startOffset = first.getDay(); // 일=0
      const start = new Date(year, month, 1 - startOffset);
      const cells = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        cells.push(d);
      }
      // 마지막 줄 전체가 다음 달이면 35개만 사용 (공간 절약)
      const lastRowAllNext = cells.slice(35).every((d) => d.getMonth() !== month);
      return lastRowAllNext ? cells.slice(0, 35) : cells;
    }

    function renderMonthGrid() {
      const grid = document.getElementById('monthGrid');
      const titleEl = document.getElementById('monthTitle');
      const { year, month } = state.viewMonth;
      titleEl.textContent = `${year}년 ${month + 1}월`;

      const cells = getMonthCells(year, month);
      const today = todayStr();
      const MAX_CHIPS = 4;

      // 셀마다 발생하는 Event 인스턴스를 먼저 모은다 (normal + recurring 전개)
      // Build: dateStr -> [{ ev, text, done }]
      const byDate = new Map();
      const cellDates = cells.map((d) => toDateStr(d));
      const minDs = cellDates[0];
      const maxDs = cellDates[cellDates.length - 1];
      const visibleYears = new Set(cells.map((d) => d.getFullYear()));

      for (const ev of state.events) {
        if (!ev.recurring) {
          if (ev.endDate < minDs || ev.startDate > maxDs) continue;
          for (const ds of cellDates) {
            if (ev.startDate <= ds && ds <= ev.endDate) {
              if (!byDate.has(ds)) byDate.set(ds, []);
              byDate.get(ds).push({ ev, text: chipDisplayText(ev, ds) });
            }
          }
        } else {
          for (const y of visibleYears) {
            const occ = recurringOccurrenceForYear(ev, y);
            if (occ && occ >= minDs && occ <= maxDs) {
              if (!byDate.has(occ)) byDate.set(occ, []);
              byDate.get(occ).push({ ev, text: chipDisplayText(ev, occ) });
            }
          }
        }
      }

      grid.innerHTML = cells.map((d) => {
        const ds = toDateStr(d);
        const inMonth = d.getMonth() === month;
        const dayItems = byDate.get(ds) || [];

        const classes = ['day-cell'];
        if (!inMonth) classes.push('other');
        if (ds === today) classes.push('today');
        if (ds === state.selectedDate) classes.push('selected');

        const visible = dayItems.slice(0, MAX_CHIPS);
        const extra = dayItems.length - visible.length;

        const chipsHtml = visible.map(({ ev, text }) => {
          const linked = findLinkedTask(ev.id, ds);
          const done = linked ? isTaskCompletedOn(linked, ds) : false;
          const cls = 'chip' + (done ? ' done' : '');
          return `
            <div class="${cls}" data-event-id="${ev.id}" style="${eventChipStyle(ev.color)}" title="${escapeHtml(text)}">
              ${escapeHtml(text)}
            </div>
          `;
        }).join('') + (extra > 0 ? `<div class="more-chip">+${extra} more</div>` : '');

        // 날씨 이모지 (오늘 ~ +15일, 일별 예보 있을 때만)
        let emojiHtml = '';
        if (Weather && Weather.getPrefs && Weather.getPrefs().enabled) {
          const diff = daysFromToday(ds);
          if (diff >= 0 && diff <= 15) {
            const daily = Weather.getDailyForDate(ds);
            if (daily) {
              const em = weatherEmoji(daily.code, true);
              if (em) emojiHtml = `<span class="weather-emoji">${em}</span>`;
            }
          }
        }

        return `
          <div class="${classes.join(' ')}" data-date="${ds}">
            <div class="cell-head">
              <div class="num">${d.getDate()}</div>
              ${emojiHtml}
            </div>
            <div class="chips">${chipsHtml}</div>
          </div>
        `;
      }).join('');
    }

    function renderWeekList() {
      renderHeader();
      renderProgressRing();
      renderWeekStrip();
      renderCategoryFilter();
      renderTaskList();
    }

    function render() {
      // 반복 Event 기준으로 이번 주 날짜에 대응하는 Task를 lazy 생성
      const weekDates = getWeekDates(state.selectedDate).map(toDateStr);
      ensureLinkedTasksForDates(weekDates);
      renderMonthGrid();
      renderWeekList();
      if (typeof renderHeaderLocation === 'function') renderHeaderLocation();
      if (typeof renderWeatherBar === 'function') renderWeatherBar();
    }

    // ---------- Event delegation ----------
    document.getElementById('weekStrip').addEventListener('click', (e) => {
      const day = e.target.closest('.week-day');
      if (!day) return;
      setSelectedDate(day.dataset.date);
      render();
    });

    // ---------- Month navigation ----------
    function changeMonth(delta) {
      let { year, month } = state.viewMonth;
      month += delta;
      if (month < 0) { month = 11; year--; }
      if (month > 11) { month = 0; year++; }
      state.viewMonth = { year, month };
      renderMonthGrid();
      const grid = document.getElementById('monthGrid');
      if (grid.animate) {
        grid.animate(
          [
            { opacity: 0, transform: `translateX(${delta > 0 ? 12 : -12}px)` },
            { opacity: 1, transform: 'translateX(0)' }
          ],
          { duration: 200, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)' }
        );
      }
    }

    document.getElementById('prevMonth').addEventListener('click', () => changeMonth(-1));
    document.getElementById('nextMonth').addEventListener('click', () => changeMonth(1));

    // ---------- Month grid: tap + long-press ----------
    (function () {
      const grid = document.getElementById('monthGrid');
      let timer = null;
      let fired = false;
      let startX = 0, startY = 0;
      let targetDate = null;

      function cancel() {
        if (timer) { clearTimeout(timer); timer = null; }
        targetDate = null;
      }

      grid.addEventListener('pointerdown', (e) => {
        const cell = e.target.closest('.day-cell');
        if (!cell) return;
        // 칩 위에서 시작된 제스처는 롱프레스 대상 아님
        if (e.target.closest('.chip')) return;
        fired = false;
        targetDate = cell.dataset.date;
        startX = e.clientX;
        startY = e.clientY;
        timer = setTimeout(() => {
          fired = true;
          timer = null;
          if (navigator.vibrate) { try { navigator.vibrate(10); } catch (_) {} }
          EventModal.openAdd(targetDate);
        }, 500);
      });

      grid.addEventListener('pointermove', (e) => {
        if (!timer && !targetDate) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (Math.hypot(dx, dy) > 10) cancel();
      });

      grid.addEventListener('pointerup', (e) => {
        const wasLongPress = fired;
        fired = false;
        cancel();
        if (wasLongPress) return;
        const chip = e.target.closest('.chip');
        if (chip) {
          const cellEl = chip.closest('.day-cell');
          const cellDate = cellEl ? cellEl.dataset.date : state.selectedDate;
          EventModal.openEdit(chip.dataset.eventId, cellDate);
          return;
        }
        const cell = e.target.closest('.day-cell');
        if (!cell) return;
        setSelectedDate(cell.dataset.date);
        render();
      });

      grid.addEventListener('pointercancel', () => { fired = false; cancel(); });
      grid.addEventListener('pointerleave', () => { cancel(); });
    })();

    document.getElementById('categoryFilter').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-cat]');
      if (!btn) return;
      state.filter = btn.dataset.cat;
      render();
    });

    document.getElementById('taskList').addEventListener('click', (e) => {
      const item = e.target.closest('.task-item');
      if (!item) return;
      const id = item.dataset.id;
      const task = state.tasks.find((x) => x.id === id);
      const actionEl = e.target.closest('[data-action]');
      const action = actionEl ? actionEl.dataset.action : 'edit';
      if (action === 'delete') {
        if (!task || task.source === 'event') return;
        if (!confirm(`"${task.title}"을(를) 삭제할까요?`)) return;
        Store.remove(id);
        render();
      } else if (action === 'toggle') {
        Store.toggleComplete(id, state.selectedDate);
        render();
      } else {
        if (task && task.source === 'event' && task.linkedEventId) {
          EventModal.openEdit(task.linkedEventId, task.date || state.selectedDate);
        } else {
          Modal.openEdit(id);
        }
      }
    });

    // ---------- Modal Controller ----------
    const Modal = (function () {
      const backdrop = document.getElementById('backdrop');
      const sheet = document.getElementById('sheet');
      const titleInput = document.getElementById('titleInput');
      const dateInput = document.getElementById('dateInput');
      const dateField = document.getElementById('dateField');
      const catSeg = document.getElementById('catSeg');
      const typeSeg = document.getElementById('typeSeg');
      const saveBtn = document.getElementById('saveBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const sheetTitle = document.getElementById('sheetTitle');

      const CATS = [
        { key: 'work',     label: '업무' },
        { key: 'personal', label: '개인' },
        { key: 'study',    label: '공부' },
        { key: 'schedule', label: '일정' }
      ];
      const TYPES = [
        { key: 'once',     label: '일회성' },
        { key: 'daily',    label: '매일' },
        { key: 'weekdays', label: '평일' },
        { key: 'weekends', label: '주말' }
      ];

      let draft = null;
      let editingId = null;

      function renderSegs() {
        catSeg.innerHTML = CATS.map((c) =>
          `<button type="button" class="${draft.category === c.key ? 'active' : ''}" data-cat="${c.key}">${c.label}</button>`
        ).join('');
        typeSeg.innerHTML = TYPES.map((t) =>
          `<button type="button" class="${draft.type === t.key ? 'active' : ''}" data-type="${t.key}">${t.label}</button>`
        ).join('');
        dateField.style.display = draft.type === 'once' ? '' : 'none';
      }

      function updateSaveState() {
        saveBtn.disabled = titleInput.value.trim().length === 0;
      }

      function open(task, presetDate) {
        draft = {
          category: task ? task.category : 'personal',
          type:     task ? task.type     : 'once',
          date:     task && task.date    ? task.date : (presetDate || state.selectedDate)
        };
        editingId = task ? task.id : null;
        sheetTitle.textContent = task ? '할 일 수정' : '새 할 일';
        titleInput.value = task ? task.title : '';
        dateInput.value = draft.date;
        renderSegs();
        updateSaveState();

        document.body.classList.add('modal-open');
        backdrop.classList.add('open');
        sheet.classList.add('open');

        setTimeout(() => {
          titleInput.focus();
          try { titleInput.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (e) {}
        }, 300);
      }

      function close() {
        backdrop.classList.remove('open');
        sheet.classList.remove('open');
        document.body.classList.remove('modal-open');
        if (document.activeElement && document.activeElement.blur) {
          document.activeElement.blur();
        }
        draft = null;
        editingId = null;
      }

      function save() {
        const title = titleInput.value.trim();
        if (!title) return;
        const payload = {
          title,
          category: draft.category,
          type: draft.type,
          date: draft.type === 'once' ? (dateInput.value || todayStr()) : ''
        };
        if (editingId) {
          Store.update(editingId, payload);
        } else {
          Store.add(payload);
          if (payload.type === 'once') setSelectedDate(payload.date);
        }
        close();
        render();
      }

      // Events
      backdrop.addEventListener('click', close);
      cancelBtn.addEventListener('click', close);
      saveBtn.addEventListener('click', save);

      titleInput.addEventListener('input', updateSaveState);
      titleInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !saveBtn.disabled) { e.preventDefault(); save(); }
      });
      titleInput.addEventListener('focus', () => {
        setTimeout(() => {
          try { titleInput.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (e) {}
        }, 250);
      });

      catSeg.addEventListener('click', (e) => {
        const b = e.target.closest('button[data-cat]');
        if (!b) return;
        draft.category = b.dataset.cat;
        renderSegs();
      });
      typeSeg.addEventListener('click', (e) => {
        const b = e.target.closest('button[data-type]');
        if (!b) return;
        draft.type = b.dataset.type;
        renderSegs();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && sheet.classList.contains('open')) close();
      });

      return {
        openAdd: (presetDate) => open(null, presetDate),
        openEdit: (id) => {
          const t = state.tasks.find((x) => x.id === id);
          if (t) open(t);
        },
        close
      };
    })();

    document.getElementById('addButton').addEventListener('click', () => Modal.openAdd());

    // ---------- Event Modal Controller ----------
    const EventModal = (function () {
      const sheet = document.getElementById('eventSheet');
      const backdrop = document.getElementById('backdrop');
      const titleInput = document.getElementById('evtTitleInput');
      const startInput = document.getElementById('evtStartInput');
      const endInput = document.getElementById('evtEndInput');
      const endWrap = document.getElementById('evtEndWrap');
      const dateFields = document.getElementById('evtDateFields');
      const rangeField = document.getElementById('evtRangeField');
      const rangeSeg = document.getElementById('evtRangeSeg');
      const kindSeg = document.getElementById('evtKindSeg');
      const swatches = document.getElementById('evtSwatches');
      const lunarRow = document.getElementById('evtLunarRow');
      const lunarBox = document.getElementById('evtLunarBox');
      const lunarPreview = document.getElementById('evtLunarPreview');
      const completeRow = document.getElementById('evtCompleteRow');
      const completeBox = document.getElementById('evtCompleteBox');
      const saveBtn = document.getElementById('evtSaveBtn');
      const cancelBtn = document.getElementById('evtCancelBtn');
      const deleteRow = document.getElementById('evtDeleteRow');
      const deleteBtn = document.getElementById('evtDeleteBtn');
      const sheetTitle = document.getElementById('eventSheetTitle');

      const KINDS = [
        { key: 'normal',      label: '일반' },
        { key: 'birthday',    label: '생일' },
        { key: 'anniversary', label: '기념일' }
      ];
      const RANGES = [
        { key: 'single', label: '하루 일정' },
        { key: 'range',  label: '기간 일정' }
      ];

      let draft = null;
      let editingId = null;
      let contextDate = null;

      function renderKindSeg() {
        kindSeg.innerHTML = KINDS.map((k) =>
          `<button type="button" class="${draft.kind === k.key ? 'active' : ''}" data-kind="${k.key}">${k.label}</button>`
        ).join('');
      }

      function renderSwatches() {
        swatches.innerHTML = EVENT_COLORS.map((c) => {
          const active = draft.color === c ? 'active' : '';
          return `<div class="swatch ${active}" data-color="${c}">
            <div class="fill" style="background:${c}"></div>
          </div>`;
        }).join('');
      }

      function renderRangeSeg() {
        rangeSeg.innerHTML = RANGES.map((r) =>
          `<button type="button" class="${draft.range === r.key ? 'active' : ''}" data-range="${r.key}">${r.label}</button>`
        ).join('');
      }

      function applyKindVisibility() {
        const isSpecial = draft.kind !== 'normal';
        if (isSpecial) {
          rangeField.style.display = 'none';
          endWrap.style.display = 'none';
          lunarRow.style.display = '';
          draft.range = 'single';
          if (startInput.value) endInput.value = startInput.value;
        } else {
          rangeField.style.display = '';
          lunarRow.style.display = 'none';
          lunarBox.checked = false;
          lunarPreview.textContent = '';
          endWrap.style.display = draft.range === 'single' ? 'none' : '';
        }
        renderRangeSeg();
      }

      function updateLunarPreview() {
        if (draft.kind === 'normal' || !lunarBox.checked || !startInput.value) {
          lunarPreview.textContent = '';
          return;
        }
        // 입력한 월/일을 음력으로 간주 → 올해 양력 날짜를 보여줌
        const [, m, d] = startInput.value.split('-').map(Number);
        const now = new Date();
        const thisYear = now.getFullYear();
        const solar = lunarToSolar(thisYear, m, d, false);
        lunarPreview.textContent =
          `음력 ${m}월 ${d}일 → ${thisYear}년 양력 ${solar.month}월 ${solar.day}일`;
      }

      function updateSaveState() {
        const ok = titleInput.value.trim().length > 0 &&
          startInput.value &&
          (draft.kind !== 'normal' || draft.range === 'single' ||
           (endInput.value && endInput.value >= startInput.value));
        saveBtn.disabled = !ok;
      }

      function setupCompletionRow(ev) {
        // 수정 모드 + 단일 날짜 일정일 때만 노출
        if (!ev) { completeRow.style.display = 'none'; return; }
        const isSingleDay = ev.startDate === ev.endDate;
        if (!isSingleDay) { completeRow.style.display = 'none'; return; }
        completeRow.style.display = '';
        const date = contextDate || ev.startDate;
        const linked = findLinkedTask(ev.id, date);
        completeBox.checked = linked ? isTaskCompletedOn(linked, date) : false;
      }

      function toggleCompletion() {
        if (!editingId) return;
        const ev = state.events.find((x) => x.id === editingId);
        if (!ev) return;
        const date = contextDate || ev.startDate;
        let linked = findLinkedTask(ev.id, date);
        if (!linked) {
          linked = makeLinkedTask(ev, date);
          state.tasks.push(linked);
        }
        Store.toggleComplete(linked.id, date);
      }

      function open(ev, presetDate) {
        editingId = ev ? ev.id : null;
        contextDate = presetDate || (ev ? ev.startDate : state.selectedDate);
        const isRange = ev ? ev.startDate !== ev.endDate : false;
        draft = {
          kind:  ev ? ev.kind  : 'normal',
          color: ev ? ev.color : EVENT_COLORS[0],
          range: isRange ? 'range' : 'single'
        };
        sheetTitle.textContent = ev ? '일정 수정' : '새 일정';
        titleInput.value = ev ? ev.title : '';
        startInput.value = ev ? ev.startDate : (presetDate || state.selectedDate);
        endInput.value   = ev ? ev.endDate   : (presetDate || state.selectedDate);
        lunarBox.checked = ev ? ev.calendarType === 'lunar' : false;
        lunarPreview.textContent = '';
        deleteRow.style.display = ev ? '' : 'none';

        renderKindSeg();
        renderSwatches();
        applyKindVisibility();
        updateLunarPreview();
        setupCompletionRow(ev);
        updateSaveState();

        document.body.classList.add('modal-open');
        backdrop.classList.add('open');
        sheet.classList.add('open');

        setTimeout(() => {
          titleInput.focus();
          try { titleInput.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (e) {}
        }, 260);
      }

      function close() {
        if (!sheet.classList.contains('open')) return;
        backdrop.classList.remove('open');
        sheet.classList.remove('open');
        document.body.classList.remove('modal-open');
        if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
        draft = null;
        editingId = null;
        contextDate = null;
        render();
      }

      function save() {
        if (saveBtn.disabled) return;
        const title = titleInput.value.trim();
        const startDate = startInput.value;
        const isSpecial = draft.kind !== 'normal';
        const endDate = isSpecial
          ? startDate
          : (draft.range === 'single' ? startDate : endInput.value);

        const payload = {
          title,
          startDate,
          endDate,
          color: draft.color,
          kind: draft.kind,
          recurring: isSpecial,
          calendarType: 'solar',
          lunarMonth: null,
          lunarDay: null,
          lunarIsLeap: false
        };

        if (isSpecial && lunarBox.checked) {
          // 입력한 월/일을 음력 날짜 그대로 사용 (사용자가 음력 월/일을 직접 입력)
          const [, m, d] = startDate.split('-').map(Number);
          payload.calendarType = 'lunar';
          payload.lunarMonth = m;
          payload.lunarDay = d;
          payload.lunarIsLeap = false;
        }

        const saved = editingId
          ? Events.update(editingId, payload)
          : Events.add(payload);
        if (saved) rebuildLinkedTasksForEvent(saved);

        // 이벤트가 위치한 달로 이동
        const [y, m] = startDate.split('-').map(Number);
        state.viewMonth = { year: y, month: m - 1 };
        close();
      }

      // Events wiring
      cancelBtn.addEventListener('click', close);
      saveBtn.addEventListener('click', save);

      titleInput.addEventListener('input', updateSaveState);
      titleInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !saveBtn.disabled) { e.preventDefault(); save(); }
      });
      titleInput.addEventListener('focus', () => {
        setTimeout(() => {
          try { titleInput.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (e) {}
        }, 220);
      });

      startInput.addEventListener('change', () => {
        if (draft.kind !== 'normal' || draft.range === 'single' ||
            !endInput.value || endInput.value < startInput.value) {
          endInput.value = startInput.value;
        }
        updateLunarPreview();
        updateSaveState();
      });
      endInput.addEventListener('change', updateSaveState);

      swatches.addEventListener('click', (e) => {
        const sw = e.target.closest('.swatch');
        if (!sw) return;
        draft.color = sw.dataset.color;
        renderSwatches();
      });

      kindSeg.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-kind]');
        if (!btn) return;
        draft.kind = btn.dataset.kind;
        renderKindSeg();
        applyKindVisibility();
        updateLunarPreview();
        updateSaveState();
      });

      rangeSeg.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-range]');
        if (!btn) return;
        draft.range = btn.dataset.range;
        if (draft.range === 'single') endInput.value = startInput.value;
        endWrap.style.display = draft.range === 'single' ? 'none' : '';
        renderRangeSeg();
        updateSaveState();
      });

      lunarBox.addEventListener('change', updateLunarPreview);

      completeBox.addEventListener('change', () => {
        toggleCompletion();
        // 모달 내에서 즉시 체크 상태는 그대로 두고, 닫힐 때 render()에서 일괄 반영
      });

      deleteBtn.addEventListener('click', () => {
        if (!editingId) return;
        if (!confirm('이 일정을 삭제할까요?')) return;
        Events.remove(editingId);
        removeLinkedTasks(editingId);
        close();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && sheet.classList.contains('open')) close();
      });

      return {
        openAdd: (presetDate) => open(null, presetDate),
        openEdit: (id, date) => {
          const ev = state.events.find((x) => x.id === id);
          if (ev) open(ev, date);
        },
        close
      };
    })();

    // 백드롭 탭 시 두 시트 모두 닫기
    document.getElementById('backdrop').addEventListener('click', () => {
      Modal.close && Modal.close();
      EventModal.close && EventModal.close();
    });

    document.getElementById('addEventBtn').addEventListener('click', () => {
      EventModal.openAdd(state.selectedDate);
    });

    // ---------- Weather Module ----------
    function weatherEmoji(code, isDay = true) {
      if (code == null) return '';
      switch (code) {
        case 0:  return isDay ? '☀️' : '🌙';
        case 1:  return '🌤️';
        case 2:  return '⛅';
        case 3:  return '☁️';
        case 45: case 48: return '🌫️';
        case 51: case 53: case 55: return '🌦️';
        case 56: case 57: return '🌧️❄️';
        case 61: case 63: case 65: return '🌧️';
        case 66: case 67: return '🌧️❄️';
        case 71: case 73: case 75: case 77: return '❄️';
        case 80: case 81: case 82: return '🌦️';
        case 85: case 86: return '🌨️';
        case 95: return '⛈️';
        case 96: case 99: return '⛈️🧊';
        default: return '';
      }
    }

    const Weather = (function () {
      const LOC_KEY = 'dayflow.location';
      const WEATHER_KEY = 'dayflow.weather';
      const PREFS_KEY = 'dayflow.weatherPrefs';
      const CACHE_TTL = 60 * 60 * 1000;
      const LAT_LON_THRESHOLD = 0.1;

      const st = {
        location: null,
        data: null,
        prefs: { enabled: true },
        status: 'idle',
        error: null
      };

      function load() {
        try {
          const l = JSON.parse(localStorage.getItem(LOC_KEY));
          if (l && typeof l.lat === 'number') st.location = l;
        } catch (_) {}
        try {
          const d = JSON.parse(localStorage.getItem(WEATHER_KEY));
          if (d && d.daily) st.data = d;
        } catch (_) {}
        try {
          const p = JSON.parse(localStorage.getItem(PREFS_KEY));
          if (p && typeof p.enabled === 'boolean') st.prefs = p;
        } catch (_) {}
      }
      function saveLoc() {
        try { localStorage.setItem(LOC_KEY, JSON.stringify(st.location)); } catch (_) {}
      }
      function saveData() {
        try { localStorage.setItem(WEATHER_KEY, JSON.stringify(st.data)); } catch (_) {}
      }
      function savePrefs() {
        try { localStorage.setItem(PREFS_KEY, JSON.stringify(st.prefs)); } catch (_) {}
      }

      function browserLocation() {
        return new Promise((resolve, reject) => {
          if (!navigator.geolocation) { reject(new Error('no geolocation')); return; }
          navigator.geolocation.getCurrentPosition(
            (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
            (err) => reject(err),
            { timeout: 8000, maximumAge: 10 * 60 * 1000 }
          );
        });
      }

      async function ipLocation() {
        const res = await fetch('https://ipapi.co/json/');
        if (!res.ok) throw new Error('ipapi failed');
        const j = await res.json();
        if (typeof j.latitude !== 'number' || typeof j.longitude !== 'number') {
          throw new Error('ipapi no coords');
        }
        return { lat: j.latitude, lon: j.longitude, ipLabel: j.city && j.country_code ? `${j.city}, ${j.country_code}` : null };
      }

      async function reverseGeocode(lat, lon) {
        try {
          const url = `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=ko&count=1`;
          const res = await fetch(url);
          if (!res.ok) return null;
          const j = await res.json();
          if (j && j.results && j.results.length) {
            const r = j.results[0];
            const cc = r.country_code || r.country || '';
            return cc ? `${r.name}, ${cc}` : r.name;
          }
        } catch (_) {}
        return null;
      }

      async function searchCity(name) {
        const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=ko`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('search failed');
        const j = await res.json();
        if (!j.results || !j.results.length) return null;
        const r = j.results[0];
        const cc = r.country_code || r.country || '';
        return {
          lat: r.latitude,
          lon: r.longitude,
          label: cc ? `${r.name}, ${cc}` : r.name
        };
      }

      async function fetchForecast(lat, lon) {
        const url =
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
          `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
          `&hourly=weather_code,precipitation_probability,precipitation,temperature_2m` +
          `&current=temperature_2m,weather_code,is_day` +
          `&timezone=auto&forecast_days=16`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('forecast failed');
        return await res.json();
      }

      async function ensureLocation(force) {
        if (st.location && !force) return st.location;
        // 1) 브라우저 Geolocation
        try {
          const c = await browserLocation();
          const label = await reverseGeocode(c.lat, c.lon)
            || `${c.lat.toFixed(2)},${c.lon.toFixed(2)}`;
          st.location = { lat: c.lat, lon: c.lon, label, updatedAt: Date.now() };
          saveLoc();
          return st.location;
        } catch (e) {
          console.warn('[weather] geolocation failed, trying IP fallback');
        }
        // 2) IP 기반 fallback
        try {
          const c = await ipLocation();
          const label = c.ipLabel || (await reverseGeocode(c.lat, c.lon)) || 'Nearby';
          st.location = { lat: c.lat, lon: c.lon, label, updatedAt: Date.now() };
          saveLoc();
          return st.location;
        } catch (e) {
          console.warn('[weather] ip fallback failed');
          st.status = 'need-permission';
          st.error = 'location';
          return null;
        }
      }

      async function refresh(force) {
        if (!st.prefs.enabled) { st.status = 'idle'; return; }
        const loc = st.location || await ensureLocation();
        if (!loc) return;

        const fresh = st.data &&
          Math.abs(st.data.lat - loc.lat) < LAT_LON_THRESHOLD &&
          Math.abs(st.data.lon - loc.lon) < LAT_LON_THRESHOLD &&
          (Date.now() - st.data.fetchedAt) < CACHE_TTL;
        if (fresh && !force) { st.status = 'ready'; return; }

        st.status = 'loading';
        try {
          const raw = await fetchForecast(loc.lat, loc.lon);
          st.data = {
            lat: loc.lat,
            lon: loc.lon,
            fetchedAt: Date.now(),
            daily: raw.daily,
            hourly: raw.hourly,
            current: raw.current || null
          };
          saveData();
          st.status = 'ready';
          st.error = null;
        } catch (e) {
          console.warn('[weather] fetch failed', e);
          st.status = st.data ? 'offline' : 'error';
          st.error = 'fetch';
        }
      }

      function getDailyForDate(dateStr) {
        if (!st.data || !st.data.daily) return null;
        const d = st.data.daily;
        const i = d.time.indexOf(dateStr);
        if (i < 0) return null;
        return {
          code: d.weather_code[i],
          tMax: d.temperature_2m_max[i],
          tMin: d.temperature_2m_min[i],
          probMax: d.precipitation_probability_max[i] ?? 0
        };
      }

      function getHourlyForDate(dateStr) {
        if (!st.data || !st.data.hourly) return null;
        const h = st.data.hourly;
        const out = [];
        for (let i = 0; i < h.time.length; i++) {
          if (h.time[i].startsWith(dateStr)) {
            out.push({
              time: h.time[i].slice(11, 16),
              code: h.weather_code[i],
              prob: h.precipitation_probability[i] ?? 0,
              precip: h.precipitation[i] ?? 0,
              temp:  h.temperature_2m[i]
            });
          }
        }
        return out.length ? out : null;
      }

      function addHour(hhmm) {
        const [h] = hhmm.split(':').map(Number);
        const nh = (h + 1) % 24;
        return String(nh).padStart(2, '0') + ':00';
      }

      function getRainPeriods(hourly) {
        if (!hourly || !hourly.length) return [];
        const out = [];
        let cur = null;
        for (const h of hourly) {
          const rainy = (h.prob >= 50) || (h.precip > 0.1);
          if (rainy) {
            if (!cur) cur = { start: h.time, end: h.time, maxProb: h.prob };
            else {
              cur.end = h.time;
              if (h.prob > cur.maxProb) cur.maxProb = h.prob;
            }
          } else if (cur) {
            out.push(cur);
            cur = null;
          }
        }
        if (cur) out.push(cur);
        return out.map((p) => ({
          start: p.start,
          end: addHour(p.end),
          maxProb: Math.round(p.maxProb)
        }));
      }

      return {
        load, refresh, ensureLocation,
        getLocation: () => st.location,
        getStatus:   () => st.status,
        getPrefs:    () => Object.assign({}, st.prefs),
        getCurrent:  () => (st.data && st.data.current) || null,
        getDailyForDate, getHourlyForDate, getRainPeriods,
        setEnabled(v) { st.prefs.enabled = !!v; savePrefs(); },
        setLocation(loc) {
          st.location = { lat: loc.lat, lon: loc.lon, label: loc.label || 'Unknown', updatedAt: Date.now() };
          saveLoc();
        },
        searchCity
      };
    })();

    // ---------- Weather renderers ----------
    function daysFromToday(dateStr) {
      const t = new Date(todayStr() + 'T00:00:00');
      const d = new Date(dateStr + 'T00:00:00');
      return Math.round((d - t) / 86400000);
    }

    function renderHeaderLocation() {
      // 위치 pill 제거됨 — no-op
    }

    /** 비 구간 요약 텍스트 (한 줄용) */
    function rainSummaryShort(periods) {
      if (!periods || !periods.length) return '비 없음';
      const p = periods[0];
      const sh = p.start.replace(':00', '');
      const eh = p.end.replace(':00', '');
      const extra = periods.length > 1 ? ` 외 ${periods.length - 1}건` : '';
      return `${sh}–${eh}시 비 (${p.maxProb}%)${extra}`;
    }

    /** 인라인 한 줄 바 (헤더 아래, 주간 스트립 위) */
    function renderWeatherBar() {
      const bar = document.getElementById('weatherBar');
      if (!bar) return;
      const prefs = Weather.getPrefs();
      const ds = state.selectedDate;
      const diff = daysFromToday(ds);

      if (!prefs.enabled || diff < 0 || diff > 15) {
        bar.classList.remove('show');
        return;
      }

      const daily = Weather.getDailyForDate(ds);
      const hourly = Weather.getHourlyForDate(ds);
      if (!daily && !hourly) { bar.classList.remove('show'); return; }

      const code = daily ? daily.code : null;
      const emoji = weatherEmoji(code, true);
      const tMin = daily ? Math.round(daily.tMin) : '-';
      const tMax = daily ? Math.round(daily.tMax) : '-';
      const probMax = daily ? Math.round(daily.probMax || 0) : 0;
      const periods = Weather.getRainPeriods(hourly);
      const rain = rainSummaryShort(periods);

      bar.classList.add('show');
      bar.innerHTML =
        `${emoji} ${tMin}° / ${tMax}°` +
        `<span class="wb-sep">·</span>강수 ${probMax}%` +
        `<span class="wb-sep">·</span>${rain}`;
    }

    /** 아코디언 (task-list 맨 위, 접이식 상세) */
    function renderWeatherAccordion() {
      const acc = document.getElementById('weatherAccordion');
      if (!acc) return;
      const prefs = Weather.getPrefs();
      const ds = state.selectedDate;
      const diff = daysFromToday(ds);

      if (!prefs.enabled || diff < 0 || diff > 15) {
        acc.classList.remove('show');
        return;
      }

      const daily = Weather.getDailyForDate(ds);
      const hourly = Weather.getHourlyForDate(ds);
      if (!daily && !hourly) { acc.classList.remove('show'); return; }

      const code = daily ? daily.code : null;
      const emoji = weatherEmoji(code, true);
      const tMin = daily ? Math.round(daily.tMin) : '-';
      const tMax = daily ? Math.round(daily.tMax) : '-';
      const periods = Weather.getRainPeriods(hourly);
      const rain = rainSummaryShort(periods);

      let detailHtml;
      if (!periods.length) {
        detailHtml = `<div class="rain-line">오늘은 비 소식 없음</div>`;
      } else {
        const shown = periods.slice(0, 3);
        detailHtml = shown.map((p) =>
          `<div class="rain-line">${p.start} – ${p.end} 비 예정 (최대 ${p.maxProb}%)</div>`
        ).join('');
        if (periods.length > 3) {
          detailHtml += `<div class="rain-line">+더보기 (${periods.length - 3})</div>`;
        }
      }

      const wasOpen = acc.classList.contains('open');
      acc.classList.add('show');
      acc.innerHTML = `
        <div class="wa-summary">
          <span>${emoji} ${tMin}°/${tMax}° <span style="opacity:0.5">·</span> ${rain}</span>
          <span class="wa-chevron">▶</span>
        </div>
        <div class="wa-detail">${detailHtml}</div>
      `;
      if (wasOpen) acc.classList.add('open');
    }

    // ---------- Settings menu ----------
    (function () {
      const menu = document.getElementById('settingsMenu');
      const btn = document.getElementById('settingsBtn');
      const refreshBtn = document.getElementById('settingsRefresh');
      const cityBtn = document.getElementById('settingsCity');
      const toggleBtn = document.getElementById('settingsToggleWeather');

      function sync() {
        toggleBtn.classList.toggle('active', Weather.getPrefs().enabled);
      }
      function open() { menu.classList.add('open'); sync(); }
      function close() { menu.classList.remove('open'); }
      function toggle() { menu.classList.contains('open') ? close() : open(); }

        const name = prompt('도시 이름 (예: Seoul, Tokyo)');

          if (!found) { alert('도시를 찾을 수 없습니다.'); return; }
          Weather.setLocation(found);
          await Weather.refresh(true);
          render();
        } catch (e) {
          alert('검색 실패');
        }
      });

      toggleBtn.addEventListener('click', async () => {
        const next = !Weather.getPrefs().enabled;
        Weather.setEnabled(next);
        sync();
        if (next) await Weather.refresh();
        render();
      });

    })();

    // ---------- Data Export / Import ----------
    function exportData() {
      const payload = {
        app: 'DayFlow',
        version: 1,
        exportedAt: new Date().toISOString(),
        tasks: state.tasks,
        events: state.events
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `dayflow-${todayStr()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data || typeof data !== 'object') throw new Error('invalid');
          if (Array.isArray(data.tasks)) {
            state.tasks = data.tasks;
            Store.save(state.tasks);
          }
          if (Array.isArray(data.events)) {
            state.events = data.events.map(normalizeEvent);
            Events.save(state.events);
          }
          render();
          alert('가져오기 완료');
        } catch (e) {
          alert('JSON 파싱 실패');
        }
      };
      reader.readAsText(file);
    }

    document.getElementById('settingsExport').addEventListener('click', () => {
      document.getElementById('settingsMenu').classList.remove('open');
      exportData();
      localStorage.setItem('dayflow.lastBackupAt', String(Date.now()));
      document.getElementById('settingsBtn').classList.remove('has-notif');
      showToast('백업 파일을 저장했어요');
    });
    document.getElementById('settingsImport').addEventListener('click', () => {
      document.getElementById('settingsMenu').classList.remove('open');
      document.getElementById('importFile').click();
    });
    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) importData(file);
      e.target.value = '';
    });

    // ---------- Install guide modal ----------
    (function () {
      const modal = document.getElementById('installModal');
      const closeBtn = document.getElementById('installCloseBtn');
      const copyBtn = document.getElementById('installCopyBtn');
      const urlInput = document.getElementById('installUrl');
      const trigger = document.getElementById('settingsInstall');

      function open() {
        urlInput.value = location.href;
        modal.classList.add('open');
      }
      function close() { modal.classList.remove('open'); }

      trigger.addEventListener('click', () => {
        document.getElementById('settingsMenu').classList.remove('open');
        open();
      });
      closeBtn.addEventListener('click', close);
      modal.addEventListener('click', (e) => { if (e.target === modal) close(); });

      copyBtn.addEventListener('click', async () => {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(urlInput.value);
          } else {
            urlInput.select();
            document.execCommand('copy');
          }
          showToast('URL을 복사했어요');
        } catch (e) {
          showToast('복사 실패', 'error');
        }
      });
    })();

    // ---------- Install banner + standalone detection ----------
    function isStandalone() {
      return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
             window.navigator.standalone === true;
    }

    (function () {
      const banner = document.getElementById('installBanner');
      const closeBtn = document.getElementById('installBannerClose');
      const dismissed = localStorage.getItem('dayflow.installBannerDismissed') === '1';
      if (isStandalone() || dismissed) {
        banner.style.display = 'none';
      } else {
        banner.style.display = '';
      }
      closeBtn.addEventListener('click', () => {
        try { localStorage.setItem('dayflow.installBannerDismissed', '1'); } catch (_) {}
        banner.style.display = 'none';
      });
    })();

    // ---------- Weekly backup reminder ----------
    function checkBackupReminder() {
      if (!isStandalone()) return;
      const last = +localStorage.getItem('dayflow.lastBackupAt') || 0;
      if (state.tasks.length === 0 && state.events.length === 0) return;
      const days = last ? Math.floor((Date.now() - last) / 86400000) : null;
      const btn = document.getElementById('settingsBtn');
      if (last === 0 || days >= 7) {
        btn.classList.add('has-notif');
        btn.title = last === 0
          ? '아직 백업한 적이 없어요'
          : `백업한 지 ${days}일 지났어요`;
      }
    }

    // 콘솔 테스트용
    window.Events = Events;
    window.EventModal = EventModal;
    window.Weather = Weather;
    window.exportData = exportData;

    // ---------- IDB repair / hydrate ----------
    async function repairFromIDB() {
      try {
        const [idbTasks, idbEvents] = await Promise.all([
          Persistence.get('dayflow.tasks'),
          Persistence.get('dayflow.events')
        ]);
        const lsTasksAt  = +localStorage.getItem('dayflow.tasks.savedAt')  || 0;
        const lsEventsAt = +localStorage.getItem('dayflow.events.savedAt') || 0;
        let changed = false;

        if (idbTasks && typeof idbTasks === 'object' && Array.isArray(idbTasks.value) &&
            (idbTasks.savedAt || 0) > lsTasksAt) {
          state.tasks = idbTasks.value;
          try {
            localStorage.setItem('dayflow.tasks', JSON.stringify(state.tasks));
            localStorage.setItem('dayflow.tasks.savedAt', String(idbTasks.savedAt));
          } catch (_) {}
          changed = true;
          console.log('[repair] tasks restored from IndexedDB');
        }
        if (idbEvents && typeof idbEvents === 'object' && Array.isArray(idbEvents.value) &&
            (idbEvents.savedAt || 0) > lsEventsAt) {
          state.events = idbEvents.value.map(normalizeEvent);
          try {
            localStorage.setItem('dayflow.events', JSON.stringify(state.events));
            localStorage.setItem('dayflow.events.savedAt', String(idbEvents.savedAt));
          } catch (_) {}
          changed = true;
          console.log('[repair] events restored from IndexedDB');
        }

        // LS 쪽이 더 신선하면 IDB로 역복사 (최초 설치 직후)
        if ((!idbTasks && state.tasks.length) || (idbTasks && lsTasksAt > (idbTasks.savedAt || 0))) {
          Persistence.mirror('dayflow.tasks', { savedAt: lsTasksAt || Date.now(), value: state.tasks });
        }
        if ((!idbEvents && state.events.length) || (idbEvents && lsEventsAt > (idbEvents.savedAt || 0))) {
          Persistence.mirror('dayflow.events', { savedAt: lsEventsAt || Date.now(), value: state.events });
        }

        if (changed) render();
      } catch (e) {
        console.warn('[repair] failed:', e);
      }
    }

    // ---------- Health check ----------
    function healthCheck() {
      console.group('DayFlow health check');
      try {
        let total = 0;
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          const v = localStorage.getItem(k);
          total += (k ? k.length : 0) + (v ? v.length : 0);
        }
        console.log(`localStorage usage: ${(total / 1024).toFixed(1)} KB`);
      } catch (_) {
        console.log('localStorage usage: (unavailable)');
      }
      console.log(`IndexedDB available: ${'indexedDB' in window} ${Persistence.isAvailable() ? '(opened)' : '(pending)'}`);
      const lastSave = Math.max(
        +localStorage.getItem('dayflow.tasks.savedAt')  || 0,
        +localStorage.getItem('dayflow.events.savedAt') || 0
      );
      console.log(`Last save at: ${lastSave ? new Date(lastSave).toISOString() : '(none)'}`);
      const lastBackup = +localStorage.getItem('dayflow.lastBackupAt') || 0;
      console.log(`Last backup at: ${lastBackup ? new Date(lastBackup).toISOString() : '(none)'}`);
      console.log(`Standalone mode: ${isStandalone()}`);
      const wdata = (function () { try { return JSON.parse(localStorage.getItem('dayflow.weather') || 'null'); } catch (_) { return null; } })();
      console.log(`Counts: tasks=${state.tasks.length}, events=${state.events.length}, weather.daily=${wdata && wdata.daily ? wdata.daily.time.length : 0}`);
      // 음력 변환 검증 (알려진 양력↔음력 대조)
      const checks = [
        { solar: [2024, 2, 10], lunar: [2024, 1, 1],  label: '2024 설날' },
        { solar: [2023, 1, 22], lunar: [2023, 1, 1],  label: '2023 설날' },
        { solar: [2025, 1, 29], lunar: [2025, 1, 1],  label: '2025 설날' },
      ];
      let lunarOk = true;
      for (const c of checks) {
        const got = solarToLunar(c.solar[0], c.solar[1], c.solar[2]);
        const pass = got.year === c.lunar[0] && got.month === c.lunar[1] && got.day === c.lunar[2];
        if (!pass) lunarOk = false;
        console.log(`Lunar check [${c.label}]: ${c.solar.join('-')} → ${got.year}-${got.month}-${got.day} ${pass ? '✓' : '✗ (expected ' + c.lunar.join('-') + ')'}`);
      }
      if (lunarOk) console.log('Lunar calendar: all checks passed ✓');
      else console.warn('Lunar calendar: some checks FAILED — table may need update');
      console.groupEnd();
    }

    // ---------- Theme Toggle (설정 메뉴 내) ----------
    (function () {
      const btn = document.getElementById('settingsTheme');
      const label = document.getElementById('settingsThemeLabel');

      function currentTheme() {
        return document.documentElement.getAttribute('data-theme') || 'dark';
      }
      function sync() {
        const isDark = currentTheme() === 'dark';
        label.textContent = isDark ? '다크 모드' : '라이트 모드';
        btn.classList.toggle('active', isDark);
      }
      btn.addEventListener('click', () => {
        const next = currentTheme() === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('dayflow.theme', next); } catch (_) {}
        sync();
        if (typeof render === 'function') render();
      });
      sync();

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.body.classList.add('transitions-enabled');
        });
      });
    })();

    // ---------- Pull to Refresh ----------
    (function () {
      const app = document.getElementById('appContainer');
      const indicator = document.getElementById('ptrIndicator');
      const textEl = indicator.querySelector('.ptr-text');
      const THRESHOLD = 70;
      let startY = 0;
      let pulling = false;

      app.addEventListener('touchstart', (e) => {
        const bp = document.getElementById('bottomPane');
        if (bp.scrollTop <= 0) {
          startY = e.touches[0].clientY;
          pulling = true;
        }
      }, { passive: true });

      app.addEventListener('touchmove', (e) => {
        if (!pulling) return;
        const dy = e.touches[0].clientY - startY;
        if (dy < 0) { indicator.style.height = '0'; return; }
        const h = Math.min(dy * 0.45, 80);
        indicator.style.height = h + 'px';
        indicator.style.transition = 'none';
        if (h >= THRESHOLD * 0.45) {
          indicator.classList.add('ready');
          textEl.textContent = '놓으면 새로고침';
        } else {
          indicator.classList.remove('ready');
          textEl.textContent = '당겨서 새로고침';
        }
      }, { passive: true });

      app.addEventListener('touchend', () => {
        if (!pulling) return;
        pulling = false;
        const h = parseFloat(indicator.style.height) || 0;
        if (h >= THRESHOLD * 0.45) {
          indicator.classList.remove('ready');
          indicator.classList.add('refreshing');
          textEl.textContent = '새로고침 중…';
          indicator.style.transition = 'height 0.2s ease';
          indicator.style.height = '32px';
          setTimeout(() => {
            // 오늘 날짜로 복귀 + 전체 새로고침
            const td = todayStr();
            setSelectedDate(td);
            render();
            // 날씨도 갱신
            (async () => {
              try {
                if (Weather.getPrefs().enabled) {
                  await Weather.refresh(true);
                  render();
                }
              } catch (_) {}
            })();
            indicator.classList.remove('refreshing');
            indicator.style.transition = 'height 0.2s ease';
            indicator.style.height = '0';
          }, 400);
        } else {
          indicator.style.transition = 'height 0.2s ease';
          indicator.style.height = '0';
          indicator.classList.remove('ready');
        }
      });
    })();

    // ---------- Bootstrap ----------
    Weather.load();
    render();
    checkBackupReminder();
    (async () => {
      await repairFromIDB();
      try {
        if (Weather.getPrefs().enabled) {
          await Weather.ensureLocation();
          await Weather.refresh();
        }
      } catch (e) { /* silent */ }
      render();
    })();

    // ---------- Ready log ----------
    (function () {
      const td = todayStr();
      const todayTasks = tasksForDate(td);
      const done = todayTasks.filter((t) => isTaskCompletedOn(t, td)).length;
      const pct = todayTasks.length ? Math.round((done / todayTasks.length) * 100) : 0;
      console.log('DayFlow ready ✓');
      console.log(`Tasks loaded: ${state.tasks.length} | Events loaded: ${state.events.length}`);
      console.log(`Today's progress: ${done}/${todayTasks.length} (${pct}%)`);
      healthCheck();
    })();

    // 콘솔 테스트용 전역 노출
    window.Store = Store;
    window.state = state;
    window.render = render;
    window.isTaskOnDate = isTaskOnDate;
    window.todayStr = todayStr;
  </script>
</body>
</html>
